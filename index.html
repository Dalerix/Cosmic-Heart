<!doctype html>
<html lang="en">
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030008" />
    <title>Cosmic Love Heart</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #030008;
        color: #fff7ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        touch-action: none;
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background:
          radial-gradient(circle at 50% 42%, rgba(255, 45, 188, 0.2), transparent 24%),
          radial-gradient(circle at 28% 70%, rgba(0, 192, 255, 0.14), transparent 28%),
          radial-gradient(circle at 70% 22%, rgba(123, 40, 255, 0.16), transparent 24%),
          #030008;
      }

      .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at center, transparent 44%, rgba(3, 0, 8, 0.34) 74%, rgba(0, 0, 0, 0.88) 100%),
          linear-gradient(180deg, rgba(255, 80, 210, 0.08), transparent 24%, transparent 70%, rgba(20, 190, 255, 0.09));
        mix-blend-mode: screen;
      }

      .title {
        position: fixed;
        left: 0;
        right: 0;
        bottom: max(8vh, 58px);
        display: grid;
        place-items: center;
        pointer-events: none;
        opacity: 0;
        transform: translateY(18px);
        animation: titleReveal 2.6s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
      }

      .title span {
        padding: 0 18px;
        max-width: min(88vw, 760px);
        text-align: center;
        text-transform: uppercase;
        font-size: clamp(2.35rem, 8vw, 5.8rem);
        font-weight: 850;
        line-height: 0.9;
        letter-spacing: 0;
        color: #fff4fb;
        text-shadow:
          0 0 8px rgba(255, 74, 213, 0.95),
          0 0 26px rgba(174, 42, 255, 0.72),
          0 0 64px rgba(0, 195, 255, 0.5);
      }

      .hint {
        position: fixed;
        left: 50%;
        bottom: max(2.4vh, 16px);
                transform: translateX(-50%);
        height: 36px;
        padding: 0 17px;
        border: 1px solid rgba(255, 170, 240, 0.28);
        border-radius: 999px;
        display: grid;
        place-items: center;
        color: rgba(255, 245, 255, 0.76);
        background: rgba(11, 0, 18, 0.38);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        backdrop-filter: blur(14px);
        user-select: none;
      }

      @keyframes titleReveal {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <canvas id="webgl" aria-label="Cosmic Love Heart WebGL scene"></canvas>
      <div class="vignette"></div>
      <div class="title">
        <span>Cosmic Love</span>
      </div>
      <button class="soundless-cta" type="button" aria-label="Explode and reform the cosmic heart">
        Tap the heart
      </button>
    </main>
    <script type="module" src="/src/main.js"></script>
    <canvas id="gl"></canvas>
    <div class="vignette"></div>
    <div class="title"><span>Cosmic Love</span></div>
    <div class="hint">Tap the heart</div>

    <script>
      (() => {
        const canvas = document.getElementById('gl');
        const gl = canvas.getContext('webgl', {
          alpha: false,
          antialias: false,
          depth: false,
          powerPreference: 'high-performance'
        });

        if (!gl) {
          document.body.innerHTML = '<div style="display:grid;place-items:center;height:100%;font:18px system-ui;color:white;background:#030008">WebGL is not available in this browser.</div>';
          return;
        }

        const isMobile = matchMedia('(max-width: 760px), (pointer: coarse)').matches;
        const dpr = Math.min(devicePixelRatio || 1, isMobile ? 1.5 : 2);
        const particleCount = isMobile ? 18000 : 32000;
        const starCount = isMobile ? 1700 : 3600;
        const wingCount = isMobile ? 8000 : 13000;
        const sparkCount = isMobile ? 600 : 1100;

        const vertexShader = `
          precision highp float;
          attribute vec3 aPosition;
          attribute vec3 aTarget;
          attribute vec3 aColor;
          attribute vec4 aSeed;
          uniform mat4 uProjection;
          uniform mat4 uView;
          uniform float uTime;
          uniform float uBeat;
          uniform float uExplosion;
          uniform float uIntro;
          uniform vec3 uPointer;
          uniform float uRatio;
          varying vec3 vColor;
          varying float vAlpha;

          float hash(float n) {
            return fract(sin(n) * 43758.5453123);
          }

          void main() {
            vec3 target = aTarget;
            float coreDistance = length(target.xy);
            float beatWave = sin(coreDistance * 2.35 - uTime * 8.2) * uBeat;
            float pulse = 1.0 + uBeat * 0.12 + beatWave * 0.06;
            vec3 dir = normalize(target + vec3(aSeed.z * 0.9, 0.22, sin(aSeed.x)));

            float loose = smoothstep(0.8, 1.0, sin(uTime * 0.3 + aSeed.x) * 0.5 + 0.5) * 0.26;
            vec3 p = target * pulse;
            p += vec3(
              sin(uTime * 1.7 + aSeed.x) * 0.08,
              cos(uTime * 1.25 + aSeed.y) * 0.08,
              sin(uTime * 1.1 + aSeed.x + aSeed.y) * 0.1
            );
            p = mix(p, p + dir * (7.0 + hash(aSeed.x) * 12.0), loose);
            p = mix(p, p + dir * (18.0 + aSeed.w * 17.0), uExplosion);
            p = mix(aPosition, p, 1.0 - uIntro);

            float influence = smoothstep(3.45, 0.0, distance(p, uPointer));
            p += normalize(p - uPointer + vec3(0.001)) * influence * (0.62 + uBeat * 0.7);

            vec4 mv = uView * vec4(p, 1.0);
            gl_Position = uProjection * mv;
            gl_PointSize = (10.0 + aSeed.w * 16.0) * uRatio * (1.0 + uBeat * 0.75 + uExplosion * 1.6) / max(1.0, -mv.z * 0.38);
            vColor = aColor;
            vAlpha = 0.7 + uBeat * 0.25 + uExplosion * 0.15;
          }
        `;

        const fragmentShader = `
          precision highp float;
          varying vec3 vColor;
          varying float vAlpha;
          void main() {
            vec2 uv = gl_PointCoord - 0.5;
            float d = length(uv);
            float core = smoothstep(0.5, 0.025, d);
            float halo = smoothstep(0.5, 0.0, d) * 0.35;
            gl_FragColor = vec4(vColor * (core * 1.9 + halo), (core + halo) * vAlpha);
          }
        `;

        const starVertex = `
          precision highp float;
          attribute vec3 aPosition;
          attribute vec3 aColor;
          uniform mat4 uProjection;
          uniform mat4 uView;
          uniform float uTime;
          uniform float uRatio;
          varying vec3 vColor;
          void main() {
            vec3 p = aPosition;
            float angle = uTime * 0.015;
            float c = cos(angle);
            float s = sin(angle);
            p.xz = mat2(c, -s, s, c) * p.xz;
            vec4 mv = uView * vec4(p, 1.0);
            gl_Position = uProjection * mv;
            gl_PointSize = 1.55 * uRatio / max(0.25, -mv.z * 0.035);
            vColor = aColor;
          }
        `;

        const starFragment = `
          precision highp float;
          varying vec3 vColor;
          void main() {
            vec2 uv = gl_PointCoord - 0.5;
            float a = smoothstep(0.5, 0.0, length(uv));
            gl_FragColor = vec4(vColor * 1.25, a * 0.68);
          }
        `;
        function explode() {
          state.explosion = 1;
          state.wing = 1;
          state.boost = 1;
          triggerSparks();
          setTimeout(() => {
            state.explosion = 0;
          }, 760);
          setTimeout(() => {
            state.wing = 0;
            state.boost = 0;
          }, 2600);
        }

        function triggerSparks() {
          for (let i = 0; i < sparkCount; i++) {
            const o = i * 6;
            const v = i * 3;
            const theta = Math.random() * Math.PI * 2;
            const z = rand(-1, 1);
            const r = Math.sqrt(1 - z * z);
            const speed = rand(2.5, 8.5);
            sparkPositions[o] = pointer.world[0];
            sparkPositions[o + 1] = pointer.world[1];
            sparkPositions[o + 2] = pointer.world[2];
            sparkPositions[o + 3] = 1;
            sparkPositions[o + 4] = rand(0.45, 0.95);
            sparkPositions[o + 5] = rand(0.78, 1);
            sparkVelocity[v] = Math.cos(theta) * r * speed;
            sparkVelocity[v + 1] = z * speed;
            sparkVelocity[v + 2] = Math.sin(theta) * r * speed;
            sparkLife[i] = rand(0.65, 1.0);
          }
        }

        function animate(now) {
          const time = (now - startTime) / 1000;
          const dt = Math.min(0.033, (now - lastTime) / 1000);
          lastTime = now;

          state.intro += (0 - state.intro) * 0.016;
          state.explosion += (0 - state.explosion) * 0.018;
          state.wing += (0 - state.wing) * 0.008;
          state.boost += (0 - state.boost) * 0.012;
          const beatTarget = Math.pow(Math.max(0, Math.sin(time * 2.05)), 18);
          state.beat += (beatTarget - state.beat) * 0.18;
          pointer.x += (pointer.tx - pointer.x) * 0.08;
          pointer.y += (pointer.ty - pointer.y) * 0.08;
          pointer.world = [pointer.x * 4.2, pointer.y * 3.4, 0];

          const aspect = canvas.width / canvas.height;
          const projection = perspective((52 * Math.PI) / 180, aspect, 0.1, 150);
          const orbit = time * (0.085 + state.boost * 0.04);
          const radius = isMobile ? 13.4 : 12.0;
          const eye = [
            Math.sin(orbit) * (2.0 + state.boost * 1.2),
            0.48 + Math.sin(time * 0.16) * 0.42,
            Math.cos(orbit) * radius + state.intro * 14
          ];
          const view = lookAt(eye, [0, -0.1, 0], [0, 1, 0]);
          const uniforms = {
            uProjection: projection,
            uView: view,
            uTime: time,
            uBeat: state.beat,
            uExplosion: state.explosion,
            uIntro: state.intro,
            uPointer: pointer.world,
            uRatio: dpr,
            uWing: state.wing
          };

          for (let i = 0; i < sparkCount; i++) {
            if (sparkLife[i] <= 0) continue;
            const o = i * 6;
            const v = i * 3;
            sparkLife[i] -= dt * 0.65;
            sparkPositions[o] += sparkVelocity[v] * dt;
            sparkPositions[o + 1] += sparkVelocity[v + 1] * dt;
            sparkPositions[o + 2] += sparkVelocity[v + 2] * dt;
            sparkPositions[o + 3] = 1;
            sparkPositions[o + 4] = Math.max(0.1, sparkLife[i]);
            sparkPositions[o + 5] = Math.max(0.35, sparkLife[i]);
            sparkVelocity[v] *= 0.984;
            sparkVelocity[v + 1] *= 0.984;
            sparkVelocity[v + 2] *= 0.984;
          }
          gl.bindBuffer(gl.ARRAY_BUFFER, sparks.buffer);
          gl.bufferData(gl.ARRAY_BUFFER, sparkPositions, gl.DYNAMIC_DRAW);

          gl.clearColor(0.012, 0.0, 0.03, 1);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.enable(gl.BLEND);
          gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

          drawBuffer(stars, gl.POINTS, uniforms);
          drawBuffer(streams, gl.POINTS, uniforms);
          drawBuffer(wings, gl.POINTS, uniforms);
          drawBuffer(heart, gl.POINTS, uniforms);
          drawBuffer(sparks, gl.POINTS, uniforms);

          drawCenterGlow(projection, view, time, state.beat);
          requestAnimationFrame(animate);
        }

        function drawCenterGlow(projection, view, time, beat) {
          const points = 900;
          if (!drawCenterGlow.buffer) {
            const data = new Float32Array(points * 6);
            for (let i = 0; i < points; i++) {
              const a = (i / points) * Math.PI * 2;
              const r = i % 3 === 0 ? 0.5 : rand(0.66, 1.1);
              const o = i * 6;
              data[o] = Math.cos(a) * r;
              data[o + 1] = Math.sin(a) * r * 0.52 - 0.12;
              data[o + 2] = rand(-0.05, 0.05);
              data[o + 3] = i % 2 ? 1 : 0.08;
              data[o + 4] = i % 2 ? 0.18 : 0.84;
              data[o + 5] = i % 2 ? 0.72 : 1;
            }
            drawCenterGlow.buffer = makeBuffer(data, 6 * 4, [
              ['aPosition', 3, 0],
              ['aColor', 3, 3]
            ], streamProgram);
          }
          drawBuffer(drawCenterGlow.buffer, gl.POINTS, {
            uProjection: projection,
            uView: view,
            uTime: time * 2.2,
            uBeat: beat + 0.55,
            uRatio: dpr
          });
        }

        addEventListener('resize', resize);
        addEventListener('pointermove', (event) => movePointer(event.clientX, event.clientY), { passive: true });
        addEventListener('touchmove', (event) => {
          const touch = event.touches[0];
          if (touch) movePointer(touch.clientX, touch.clientY);
        }, { passive: true });
        addEventListener('pointerdown', explode);

        resize();
        requestAnimationFrame(animate);
      })();
    </script>
  </body>
</html>
